<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<style>
  :root{
    --bg-0:#0a0e14;
    --bg-1:#0f1420;
    --bg-2:#151b2b;
    --bg-3:#1c2438;
    --accent:#22d3ee;
    --accent-2:#a78bfa;
    --good:#34d399;
    --warn:#fbbf24;
    --bad:#f87171;
    --text-0:#e6ebf5;
    --text-1:#9fb0cc;
    --text-2:#6b7893;
    --border:#26304a;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:radial-gradient(circle at 20% 0%, #131a2a 0%, var(--bg-0) 55%);
    color:var(--text-0);
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  #root{min-height:100vh;}
  .app-shell{
    max-width:1100px;
    margin:0 auto;
    padding:24px 20px 60px;
    min-height:100vh;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    font-weight:700;
    font-size:1.15rem;
    letter-spacing:0.5px;
  }
  .brand .dot{
    width:12px;height:12px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 12px 2px var(--accent);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:.5;transform:scale(1.25);}
  }
  .stage-pill{
    font-size:.75rem;
    color:var(--text-1);
    background:var(--bg-2);
    border:1px solid var(--border);
    padding:6px 12px;
    border-radius:999px;
    letter-spacing:.5px;
  }
  .progress-track{
    width:100%;
    height:8px;
    background:var(--bg-2);
    border-radius:999px;
    overflow:hidden;
    border:1px solid var(--border);
    margin-bottom:28px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    border-radius:999px;
    transition:width .6s cubic-bezier(.4,0,.2,1);
    box-shadow:0 0 10px var(--accent);
  }
  .card{
    background:linear-gradient(160deg,var(--bg-2),var(--bg-1));
    border:1px solid var(--border);
    border-radius:16px;
    padding:28px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    animation:fadeSlide .5s ease;
  }
  @keyframes fadeSlide{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }
  h1{
    font-size:1.9rem;
    margin:0 0 8px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:.5px;
  }
  h2{
    font-size:1.35rem;
    margin:0 0 6px;
    color:var(--text-0);
  }
  h3{
    font-size:1.05rem;
    margin:0 0 10px;
    color:var(--accent);
  }
  p{color:var(--text-1);line-height:1.55;}
  .muted{color:var(--text-2);font-size:.85rem;}
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:12px 22px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg-3);
    color:var(--text-0);
    font-size:.95rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s ease;
    user-select:none;
  }
  .btn:hover{
    transform:translateY(-2px);
    border-color:var(--accent);
    box-shadow:0 6px 18px rgba(34,211,238,.18);
  }
  .btn:active{transform:translateY(0);}
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),#0ea5c4);
    color:#04141a;
    border:none;
  }
  .btn-primary:hover{
    box-shadow:0 8px 22px rgba(34,211,238,.35);
  }
  .btn-primary:disabled{
    opacity:.4;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }
  .btn-ghost{
    background:transparent;
  }
  .btn-danger{
    background:linear-gradient(135deg,#f87171,#dc2626);
    color:#2a0505;
    border:none;
  }
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .row.end{justify-content:flex-end;}
  .row.between{justify-content:space-between;align-items:center;}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:16px;
    margin:18px 0;
  }
  .option-card{
    background:var(--bg-3);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    cursor:pointer;
    transition:all .2s ease;
    position:relative;
  }
  .option-card:hover{
    border-color:var(--accent);
    transform:translateY(-3px);
    box-shadow:0 10px 24px rgba(0,0,0,.4);
  }
  .option-card.selected{
    border-color:var(--accent);
    background:linear-gradient(160deg, rgba(34,211,238,.14), var(--bg-3));
    box-shadow:0 0 0 1px var(--accent) inset, 0 10px 24px rgba(34,211,238,.15);
  }
  .option-card.correct{
    border-color:var(--good);
    background:linear-gradient(160deg, rgba(52,211,153,.16), var(--bg-3));
  }
  .option-card.wrong{
    border-color:var(--bad);
    background:linear-gradient(160deg, rgba(248,113,113,.16), var(--bg-3));
  }

    display:inline-block;
    font-size:.7rem;
    letter-spacing:.5px;
    color:var(--text-2);
    background:var(--bg-2);

    align-items:center;
    gap:6px;
    font-size:.75rem;
    padding:4px 10px;
    border-radius:999px;
    background:var(--bg-2);
    border:1px solid var(--border);
    color:var(--text-1);
  }
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:14px;
    margin:18px 0;
  }
  .stat-box{
    background:var(--bg-3);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    text-align:center;
  }
  .stat-box .val{

    font-weight:800;
    color:var(--accent);
  }
  .stat-box .lbl{

    color:var(--text-2);
    letter-spacing:.5px;
    text-transform:uppercase;
    margin-top:4px;
  }

    background:var(--bg-2);
    border-radius:999px;
    overflow:hidden;
    border:1px solid var(--border);
    margin-top:6px;

  .divider{
    height:1px;
    background:var(--border);

  .company-header{

    align-items:center;
    gap:16px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .logo-box{

    font-size:1.3rem;
    color:#04141a;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));

    padding:18px;
    margin-bottom:20px;
    display:flex;
    gap:14px;
    align-items:flex-start;
  }
  .crisis-icon{
    font-size:1.8rem;
    line-height:1;
  }
  .footer-nav{
    margin-top:26px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
  }
  .round-tabs{
    display:flex;
    gap:8px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .round-tab{

    border-radius:999px;
    background:var(--bg-2);
    border:1px solid var(--border);
    font-size:.78rem;
    color:var(--text-2);
  }
  .round-tab.active{
    color:#04141a;
    background:var(--accent);
    border-color:var(--accent);
    font-weight:700;
  }
  .round-tab.done{
    color:var(--good);

  textarea, select{
    width:100%;
    background:var(--bg-2);
    border:1px solid var(--border);
    color:var(--text-0);
    border-radius:10px;
    padding:10px;
    font-family:inherit;

  .slider-wrap{margin:16px 0;}
  input[type="range"]{

  }
  .kpi-callout{
    font-size:.85rem;
    color:var(--text-2);
    margin-top:4px;
  }
  .score-hero{

    padding:30px 10px;
  }
  .score-ring{

    margin:0 auto 18px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .score-ring .value{
    font-size:2.4rem;
    font-weight:800;
  }
  .score-ring .sub{
    font-size:.7rem;
    color:var(--text-2);
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .rank-badge{
    display:inline-block;
    padding:8px 20px;
    border-radius:999px;
    font-weight:700;
    letter-spacing:.5px;
    margin-top:10px;
  }
  .log-list{
    list-style:none;
    padding:0;margin:0;
    display:flex;flex-direction:column;gap:10px;
  }
  .log-item{
    background:var(--bg-3);
    border:1px solid var(--border);
    border-left:4px solid var(--accent);
    border-radius:10px;
    padding:12px 14px;
    font-size:.88rem;
    color:var(--text-1);
  }
  .log-item.bad{border-left-color:var(--bad);}
  .log-item.good{border-left-color:var(--good);}
  .selectable-count{
    font-size:.85rem;
    color:var(--text-2);
    margin-bottom:10px;
  }
  .welcome-hero{
    text-align:center;
    padding:40px 10px 20px;
  }
  .welcome-hero .icon{
    font-size:3.4rem;
    margin-bottom:12px;
  }
  .feature-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:14px;
    margin:26px 0;
    text-align:left;
  }
  .feature-item{
    background:var(--bg-3);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
  }
  .feature-item .fi-title{
    font-weight:700;
    color:var(--accent);
    margin-bottom:4px;
    font-size:.92rem;
  }
  .feature-item .fi-desc{
    font-size:.82rem;
    color:var(--text-2);
  }
  @media (max-width:600px){
    .app-shell{padding:16px 12px 40px;}
    h1{font-size:1.5rem;}
    .card{padding:18px;}
    .score-ring{width:150px;height:150px;}
  }
</style>
</head>

];
const INDUSTRIES = [
  "Automotive Manufacturing","Consumer Electronics","Packaged Foods",
  "Industrial Robotics","Apparel & Textiles","Pharmaceuticals",
  "Third-Party Logistics","Semiconductor Fabrication","Agricultural Technology",
  "Home Appliances","Heavy Industrial Equipment","Beverages"
];
const HQ_LOCATIONS = [
  "Rotterdam, Netherlands","Austin, USA","Singapore","Chennai, India","Busan, South Korea",
  "Hamburg, Germany","Ho Chi Minh City, Vietnam","São Paulo, Brazil","Manchester, UK","Nairobi, Kenya"
];
const SIZES = [
  { label: "Mid-Market", revenue: "$180M annual revenue", employees: "1,200 employees" },
  { label: "Enterprise", revenue: "$2.4B annual revenue", employees: "14,500 employees" },
  { label: "Global Conglomerate", revenue: "$9.8B annual revenue", employees: "48,000 employees" },
];

function generateCompany(rng) {
  const name = COMPANY_NAMES[rng.int(COMPANY_NAMES.length)];
  const industry = INDUSTRIES[rng.int(INDUSTRIES.length)];
  const hq = HQ_LOCATIONS[rng.int(HQ_LOCATIONS.length)];
  const size = SIZES[rng.int(SIZES.length)];
  const initials = name.split(" ").map(w => w[0]).join("").slice(0,3).toUpperCase();
  const supplierCount = 40 + rng.int(160);
  const warehouseCount = 3 + rng.int(22);
  const skuCount = 500 + rng.int(9500);
  return { name, industry, hq, size, initials, supplierCount, warehouseCount, skuCount };
}

/* ============================== RNG ============================== */
function makeRng(seed) {
  let s = seed >>> 0;
  return {
    next() {
      s ^= s << 13; s >>>= 0;
      s ^= s >>> 17;
      s ^= s << 5; s >>>= 0;
      return (s >>> 0) / 4294967296;
    },
    int(max) { return Math.floor(this.next() * max); },
  };
}
function shuffle(arr, rng) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = rng.int(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n, rng) { return shuffle(arr, rng).slice(0, n); }

/* ============================== SCORE ENGINE ============================== */

function computeScore({ crisis, warRoomSelected, warRoomOptions, negotiationChoices, negotiationRounds, quizAnswers, quizQuestions, aiSelected, aiOptions }) {
  // War room aggregate
  const wrChosen = warRoomOptions.filter(o => warRoomSelected.includes(o.id));
  const wrSpeed = wrChosen.reduce((a,b)=>a+b.speed,0);
  const wrCost = wrChosen.reduce((a,b)=>a+b.cost,0);
  const wrRisk = wrChosen.reduce((a,b)=>a+b.risk,0);

  // Negotiation aggregate
  let negCost = 0, negTrust = 0, negSpeed = 0;
  negotiationRounds.forEach((round, i) => {
    const choiceId = negotiationChoices[i];
    const opt = round.options.find(o => o.id === choiceId);
    if (opt) { negCost += opt.cost; negTrust += opt.trust; negSpeed += opt.speed; }
  });

  // Quiz aggregate
  let correctCount = 0;
  quizQuestions.forEach((q, i) => { if (quizAnswers[i] === q.correct) correctCount++; });
  const quizScorePct = (correctCount / quizQuestions.length) * 100;

  // AI aggregate
  const aiChosen = aiOptions.filter(o => aiSelected.includes(o.id));
  const aiImpact = aiChosen.reduce((a,b)=>a+b.impact,0);
  const aiCost = aiChosen.reduce((a,b)=>a+b.cost,0);

  // Severity multiplier — harder crises are harder to score well against
  const sevPenalty = crisis.severity === "Critical" ? 10 : crisis.severity === "High" ? 5 : 0;

  // Normalize sub-scores to 0-100
  const speedScore = Math.min(100, ((wrSpeed + negSpeed) / (15 + 20)) * 100);
  const trustScore = Math.min(100, (negTrust / 40) * 100);
  const riskScore = Math.max(0, 100 - (wrRisk / 9) * 100); // lower risk taken = higher score
  const costEfficiency = Math.max(0, 100 - (((wrCost + negCost + aiCost) / 55) * 100));
  const strategyScore = Math.min(100, (aiImpact / 20) * 100);
  const boardroomScore = quizScorePct;

  const rawTotal =
    speedScore * 0.20 +
    trustScore * 0.15 +
    riskScore * 0.15 +
    costEfficiency * 0.15 +
    strategyScore * 0.15 +
    boardroomScore * 0.20;

  const finalScore = Math.max(0, Math.min(100, Math.round(rawTotal - sevPenalty)));

  let rank, rankColor;
  if (finalScore >= 85) { rank = "Crisis Master 🏆"; rankColor = "var(--good)"; }
  else if (finalScore >= 70) { rank = "Resilient Operator 💪"; rankColor = "var(--accent)"; }
  else if (finalScore >= 50) { rank = "Steady Hand ⚖️"; rankColor = "var(--warn)"; }
  else { rank = "Crisis Survivor 🩹"; rankColor = "var(--bad)"; }

  return {
    finalScore, rank, rankColor,
    breakdown: [
      { label: "Response Speed", value: Math.round(speedScore) },
      { label: "Supplier Trust", value: Math.round(trustScore) },
      { label: "Risk Management", value: Math.round(riskScore) },
      { label: "Cost Efficiency", value: Math.round(costEfficiency) },
      { label: "AI Strategy Impact", value: Math.round(strategyScore) },
      { label: "Boardroom IQ", value: Math.round(boardroomScore) },
    ],
    correctCount,
    totalQuestions: quizQuestions.length,
    wrChosen, aiChosen,
  };
}

function meterColor(v) {
  if (v >= 70) return "var(--good)";
  if (v >= 45) return "var(--warn)";
  return "var(--bad)";
}

const STAGE_NAMES = [
  "Welcome","Company Briefing","Crisis Briefing","War Room",
  "Supplier Negotiation","Boardroom Quiz","AI Strategy","Executive Dashboard"
];

function App() {
  const [seedTick, setSeedTick] = useState(0);
  const rng = useMemo(() => makeRng(Date.now() % 2147483647 + seedTick * 7919), [seedTick]);

  const company = useMemo(() => generateCompany(rng), [seedTick]);
  const crisis = useMemo(() => CRISES[rng.int(CRISES.length)], [seedTick]);
  const warRoomOptions = useMemo(() => pickN(WAR_ROOM_RESPONSES, 6, rng), [seedTick]);
  const negotiationRounds = useMemo(() => NEGOTIATION_ROUNDS, [seedTick]);
  const quizQuestions = useMemo(() => pickN(QUIZ_QUESTIONS, 5, rng), [seedTick]);
  const aiOptions = useMemo(() => pickN(AI_INVESTMENTS, 6, rng), [seedTick]);

  const [stage, setStage] = useState(0);

  const [warRoomSelected, setWarRoomSelected] = useState([]);
  const [roundIndex, setRoundIndex] = useState(0);
  const [negotiationChoices, setNegotiationChoices] = useState({});
  const [qIndex, setQIndex] = useState(0);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [aiSelected, setAiSelected] = useState([]);

  const goTo = useCallback((s) => { setStage(s); window.scrollTo({top:0, behavior:"smooth"}); }, []);

  function handleReplay() {
    setSeedTick(t => t + 1);
    setStage(0);
    setWarRoomSelected([]);
    setRoundIndex(0);
    setNegotiationChoices({});
    setQIndex(0);
    setQuizAnswers({});
    setAiSelected([]);
    window.scrollTo({top:0, behavior:"smooth"});
  }

  function handleNegotiationChoose(idx, optId) {
    setNegotiationChoices(prev => ({ ...prev, [idx]: optId }));
  }

  function handleQuizAnswer(idx, optIdx) {
    setQuizAnswers(prev => ({ ...prev, [idx]: optIdx }));
  }

  const scoreData = useMemo(() => {
    if (stage !== 7) return null;
    return computeScore({
      crisis,
      warRoomSelected, warRoomOptions,
      negotiationChoices, negotiationRounds,
      quizAnswers, quizQuestions,
      aiSelected, aiOptions,
    });
  }, [stage]);

  return (
    <div className="app-shell">
      <div className="topbar">
        <div className="brand"><span className="dot"></span> Operation Lifeline</div>
        {stage > 0 && <div className="stage-pill">{STAGE_NAMES[stage]}</div>}
      </div>
      {stage > 0 && <ProgressBar stage={stage} total={7} />}

      {stage === 0 && <WelcomeScreen onStart={() => goTo(1)} />}

      {stage === 1 && <CompanyScreen company={company} onNext={() => goTo(2)} />}

      {stage === 2 && <CrisisScreen crisis={crisis} company={company} onNext={() => goTo(3)} />}

      {stage === 3 && (
        <WarRoomScreen
          options={warRoomOptions}
          selected={warRoomSelected}
          setSelected={setWarRoomSelected}
          onNext={() => goTo(4)}
        />
      )}

      {stage === 4 && (
        <NegotiationScreen
          rounds={negotiationRounds}
          roundIndex={roundIndex}
          choices={negotiationChoices}
          onChoose={handleNegotiationChoose}
          onPrevRound={() => setRoundIndex(i => Math.max(0, i - 1))}
          onNext={() => {
            if (roundIndex < negotiationRounds.length - 1) {
              setRoundIndex(i => i + 1);
            } else {
              goTo(5);
            }
          }}
        />
      )}

      {stage === 5 && (
        <QuizScreen
          questions={quizQuestions}
          qIndex={qIndex}
          answers={quizAnswers}
          onAnswer={handleQuizAnswer}
          onPrev={() => setQIndex(i => Math.max(0, i - 1))}
          onNext={() => {
            if (qIndex < quizQuestions.length - 1) {
              setQIndex(i => i + 1);
            } else {
              goTo(6);
            }
          }}
        />
      )}

      {stage === 6 && (
        <AIStrategyScreen
          options={aiOptions}
          selected={aiSelected}
          setSelected={setAiSelected}
          onNext={() => goTo(7)}
        />
      )}

      {stage === 7 && scoreData && (
        <DashboardScreen
          company={company}
          crisis={crisis}
          scoreData={scoreData}
          onReplay={handleReplay}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
